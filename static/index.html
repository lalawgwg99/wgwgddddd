<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Label Saver</title>
    <style>
        :root {
            --bg-color: #F5F5F7;
            --container-bg: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --border-color: #D2D2D7;
            --accent-color: #0071E3;
            --accent-hover: #0077ED;
            --success-color: #34C759;
            --error-color: #FF3B30;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro TC", "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --container-bg: #1C1C1E;
                --text-primary: #F5F5F7;
                --text-secondary: #86868B;
                --border-color: #38383A;
                --accent-color: #0A84FF;
                --accent-hover: #007AFF;
            }
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.04);
            padding: 32px;
            width: 100%;
            max-width: 600px;
            transition: box-shadow 0.3s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: var(--font-stack);
            font-size: 15px;
            color: var(--text-primary);
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .folder-section {
            background: rgba(0, 113, 227, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .folder-info {
            flex: 1;
            margin-right: 12px;
        }

        .folder-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .folder-path {
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-all;
            font-weight: 500;
        }

        .button-secondary {
            background-color: rgba(120, 120, 128, 0.16);
            color: var(--accent-color);
            border: none;
            border-radius: 14px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .button-secondary:hover {
            background-color: rgba(120, 120, 128, 0.25);
        }

        .button-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 16px;
        }

        button.primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 22px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        button.primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 113, 227, 0.4);
        }

        button.primary:active {
            transform: translateY(0);
        }

        button.primary:disabled {
            background-color: var(--text-secondary);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Results List */
        .results-section {
            margin-top: 32px;
            display: none;
        }

        .results-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .result-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-model {
            font-weight: 500;
        }

        .result-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-secondary);
        }

        .status-dot.success { background-color: var(--success-color); }
        .status-dot.error { background-color: var(--error-color); }
        .status-dot.pending { background-color: #FF9F0A; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        button.loading .spinner {
            display: inline-block;
        }
        button.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>分級圖檔下載器</h1>
    <p class="subtitle">輸入型號，將產品類別設為「全部」並自動抓取正式分級圖檔。</p>

    <div class="folder-section">
        <div class="folder-info">
            <div class="folder-label">儲存資料夾</div>
            <div id="folderPath" class="folder-path">讀取中...</div>
        </div>
        <button class="button-secondary" onclick="selectFolder()">選擇資料夾</button>
    </div>

    <div class="input-group">
        <label for="models">型號列表 (每行一個)</label>
        <textarea id="models" placeholder="例如：&#10;RXV50ZVLT&#10;RXV60ZVLT"></textarea>
    </div>

    <div class="button-row">
        <button id="downloadBtn" class="primary" onclick="startDownload()">
            <span class="btn-text">開始抓取圖檔</span>
            <div class="spinner"></div>
        </button>
    </div>

    <div id="resultsSection" class="results-section">
        <div class="results-title">執行結果</div>
        <ul id="resultList" class="result-list"></ul>
    </div>
</div>

<script>
    // 初始化路徑
    async function init() {
        try {
            const resp = await fetch('/api/config');
            const data = await resp.json();
            document.getElementById('folderPath').textContent = data.save_dir;
        } catch (e) {
            document.getElementById('folderPath').textContent = '無法連線伺服器';
        }
    }

    async function selectFolder() {
        try {
            const resp = await fetch('/api/select-folder', { method: 'POST' });
            const data = await resp.json();
            if (data.status === 'success') {
                document.getElementById('folderPath').textContent = data.path;
                // 同步回後端
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ save_dir: data.path })
                });
            }
        } catch (e) {
            alert('選取失敗: ' + e);
        }
    }

    async function startDownload() {
        const textarea = document.getElementById('models');
        const btn = document.getElementById('downloadBtn');
        const resultsSection = document.getElementById('resultsSection');
        const resultList = document.getElementById('resultList');

        const text = textarea.value.trim();
        if (!text) {
            textarea.focus();
            return;
        }

        const models = text.split('\n').map(m => m.trim()).filter(m => m);
        if (models.length === 0) return;

        btn.classList.add('loading');
        btn.disabled = true;
        resultsSection.style.display = 'block';
        resultList.innerHTML = '';

        models.forEach(model => {
            const li = document.createElement('li');
            li.className = 'result-item';
            li.id = `item-${model.replace(/[^a-zA-Z0-9]/g, '_')}`;
            li.innerHTML = `
                <div class="result-model">${model}</div>
                <div class="result-status">
                    <div class="status-dot pending"></div>
                    <span class="status-text">搜尋中...</span>
                </div>
            `;
            resultList.appendChild(li);
        });

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ models: models })
            });

            const data = await response.json();
            
            if (response.ok) {
                data.results.forEach(res => {
                    const safeId = `item-${res.model.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    const li = document.getElementById(safeId);
                    if (li) {
                        const dot = li.querySelector('.status-dot');
                        const textElement = li.querySelector('.status-text');
                        dot.className = 'status-dot';
                        if (res.result.status === 'success') {
                            dot.classList.add('success');
                            textElement.textContent = '成功';
                        } else {
                            dot.classList.add('error');
                            textElement.textContent = res.result.message;
                        }
                    }
                });
            }
        } catch (err) {
            alert('連線外洩或後端出錯');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    window.onload = init;
</script>

</body>
</html>
